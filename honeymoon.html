<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honeymoon Fund — Kel & Iyah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Cormorant Garamond", Georgia, serif;
    background: radial-gradient(1200px 600px at 50% -10%, #fffdf6 0%, #f7f3ea 60%), #f7f3ea;
    color: #23252b;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate {
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .monogram {
    width: 92px; height: 92px;
    margin: 0 auto 22px;
    border: 2px solid #b08d3e;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 600; letter-spacing: 2px;
    color: #23252b;
    background: #fffdf6;
  }
  .eyebrow {
    font-family: "Jost", sans-serif;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #8a6d2f;
  }
  h1 { font-size: 40px; font-weight: 500; margin: 8px 0 6px; }
  p.sub { font-style: italic; color: #4b4d55; margin-bottom: 28px; font-size: 18px; }
  form { display: flex; gap: 10px; justify-content: center; }
  input {
    font-family: "Jost", sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    border: 1.5px solid #b08d3e;
    border-radius: 2px;
    background: #fffdf6;
    color: #23252b;
    width: 100%;
    max-width: 240px;
    outline: none;
    text-align: center;
    letter-spacing: 0.08em;
  }
  input:focus { border-color: #8a6d2f; box-shadow: 0 0 0 3px rgba(176,141,62,0.15); }
  button {
    font-family: "Jost", sans-serif;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 12px 22px;
    border: 1.5px solid #8a6d2f;
    background: #8a6d2f; color: #f7f3ea;
    border-radius: 2px; cursor: pointer;
    transition: all 0.2s ease;
  }
  button:hover { background: #23252b; border-color: #23252b; }
  button:disabled { opacity: 0.6; cursor: wait; }
  .hint {
    font-family: "Jost", sans-serif;
    font-size: 12px; letter-spacing: 0.06em;
    color: #4b4d55; opacity: 0.8;
    margin-top: 22px;
  }
  .error {
    color: #7a3b3f; font-style: italic; margin-top: 16px;
    min-height: 24px; font-size: 17px;
  }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="monogram">K·I</div>
  <p class="eyebrow">You have reached the private celebration of</p>
  <h1>Kel &amp; Iyah</h1>
  <p class="sub">Whisper the secret word and the doors shall open.</p>
  <form id="pwform">
    <input type="password" id="pw" placeholder="the secret word" autocomplete="current-password" autofocus>
    <button type="submit" id="go">Enter</button>
  </form>
  <p class="error" id="err"></p>
  <p class="hint">Hint: it&rsquo;s on your invitation. Or ask the couple. Or the dog &mdash; the dog knows everything.</p>
</div>

  }

  function unlock(html, keyBits) {
    try { sessionStorage.setItem(KEYSTORE, bytesToB64(keyBits)); } catch (e) {}
    document.open();
    document.write(html);
    document.close();
  }

  async function tryPassword(password) {
    var bits = await deriveKeyBits(password);
    var html = await decryptWith(bits); // throws if wrong
    unlock(html, bits);
  }

  async function boot() {
    // 1. Key already in this tab's session? (entered on another page)
    try {
      var stored = sessionStorage.getItem(KEYSTORE);
      if (stored) {
        var bits = b64ToBytes(stored).buffer;
        var html = await decryptWith(bits);
        unlock(html, bits);
        return true;
      }
    } catch (e) { try { sessionStorage.removeItem(KEYSTORE); } catch (_) {} }
    // 2. Password in URL fragment? e.g. site/#secretword (fragment never hits the server)
    if (location.hash.length > 1) {
      try {
        var pw = decodeURIComponent(location.hash.slice(1));
        await tryPassword(pw);
        return true;
      } catch (e) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }
    return false;
  }

  document.getElementById("pwform").addEventListener("submit", async function (ev) {
    ev.preventDefault();
    var input = document.getElementById("pw");
    var btn = document.getElementById("go");
    var err = document.getElementById("err");
    btn.disabled = true;
    err.textContent = "";
    try {
      await tryPassword(input.value.trim());
    } catch (e) {
      btn.disabled = false;
      err.textContent = "Hmm, that's not it. The dog looks disappointed.";
      input.value = "";
      input.focus();
      var gate = document.getElementById("gate");
      gate.classList.remove("shake");
      void gate.offsetWidth;
      gate.classList.add("shake");
    }
  });

  boot();
})();
</script>
</body>
</html>
