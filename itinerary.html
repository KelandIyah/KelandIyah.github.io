  --paper: #f7f3ea;
  --paper-2: #efe7d6;
  --ink: #23252b;
  --ink-soft: #4b4d55;
  --gold: #b08d3e;
  --gold-deep: #8a6d2f;
  --green: #35523f;
  --wine: #7a3b3f;
  --rule: rgba(138, 109, 47, 0.35);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; overflow-x: hidden; }

body {
  overflow-x: hidden;
  font-family: "Cormorant Garamond", Georgia, serif;
  background:
    radial-gradient(1200px 600px at 50% -10%, #fffdf6 0%, var(--paper) 60%),
    var(--paper);
  color: var(--ink);
  line-height: 1.6;
  font-size: 19px;
  -webkit-font-smoothing: antialiased;
}

.crest-img {
  display: block;
  background: var(--crest) center / contain no-repeat;
  aspect-ratio: 1200 / 928;
}

.eyebrow {
  font-family: "Jost", "Helvetica Neue", sans-serif;
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold-deep);
}

h1, h2, h3 { font-weight: 600; line-height: 1.15; }

a { color: var(--gold-deep); }

/* ---- Nav ---- */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1020px;
  margin: 0 auto;
  padding: 18px 24px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--ink);
}
.nav-brand .crest-mini { width: 50px; }
.nav-brand span {
  font-family: "Cormorant Garamond", serif;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.nav-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px 26px;
  font-family: "Jost", sans-serif;
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.nav-links a {
  color: var(--ink-soft);
  text-decoration: none;
  padding-bottom: 4px;
  border-bottom: 2px solid transparent;
}
.nav-links a:hover { color: var(--gold-deep); }
.nav-links a.active {
  color: var(--ink);
  border-bottom-color: var(--gold);
}

.rule {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule), transparent);
  max-width: 1020px;
  margin: 0 auto;
}

/* ---- Layout ---- */
.wrap { max-width: 1020px; margin: 0 auto; padding: 0 24px; }
.narrow { max-width: 720px; margin: 0 auto; }

section { padding: 64px 0; }

.section-head { text-align: center; margin-bottom: 42px; }
.section-head h2 { font-size: 40px; margin-top: 10px; }
.section-head p.sub { color: var(--ink-soft); font-style: italic; margin-top: 8px; }

/* ---- Hero ---- */
.hero { text-align: center; padding: 56px 24px 40px; }
.hero .crest-hero { width: min(430px, 82%); margin: 0 auto 10px; }
.crest-caption {
  font-family: "Jost", sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  opacity: 0.75;
  margin-bottom: 30px;
}
.hero h1 {
  font-size: clamp(56px, 9vw, 96px);
  font-weight: 500;
  letter-spacing: 0.01em;
}
.hero h1 .amp {
  font-style: italic;
  color: var(--gold);
  font-weight: 400;
  padding: 0 0.08em;
}
.hero .tagline {
  font-size: 26px;
  font-style: italic;
  color: var(--ink-soft);
  margin-top: 6px;
}
.hero .whenwhere {
  margin-top: 26px;
  font-family: "Jost", sans-serif;
  font-size: 13px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink);
}
.hero .mystery {
  margin-top: 10px;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 17px;
}
.hero-cta { margin-top: 34px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* ---- Buttons ---- */
.btn {
  display: inline-block;
  font-family: "Jost", sans-serif;
  font-size: 13px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 13px 28px;
  border: 1.5px solid var(--gold-deep);
  color: var(--gold-deep);
  background: transparent;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.22s ease;
}
.btn:hover { background: var(--gold-deep); color: var(--paper); transform: translateY(-1px); }
.btn.solid { background: var(--gold-deep); color: var(--paper); }
.btn.solid:hover { background: var(--ink); border-color: var(--ink); }

/* ---- Cards ---- */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 22px;
}
.card {
  background: #fffdf6;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 30px 28px;
  box-shadow: 0 1px 0 rgba(35, 37, 43, 0.04);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(35, 37, 43, 0.08); }
.card .when {
  font-family: "Jost", sans-serif;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
}
.card h3 { font-size: 27px; margin: 8px 0 4px; }
.card .where { font-style: italic; color: var(--wine); font-size: 17px; }
.card p.desc { margin-top: 12px; color: var(--ink-soft); font-size: 17.5px; }

/* ---- FAQ ---- */
.faq { max-width: 720px; margin: 0 auto; }
.faq-item { padding: 22px 0; border-bottom: 1px solid var(--rule); }
.faq-item:last-child { border-bottom: none; }
.faq-item h3 { font-size: 24px; }
.faq-item p { color: var(--ink-soft); margin-top: 6px; }

/* ---- Itinerary timeline ---- */
.day { margin-bottom: 56px; }
.day-title { text-align: center; margin-bottom: 30px; }
.day-title h2 { font-size: 38px; }
.day-title .sub { font-style: italic; color: var(--ink-soft); }
.timeline { position: relative; max-width: 680px; margin: 0 auto; padding-left: 118px; }
.timeline::before {
  content: "";
  position: absolute;
  left: 96px;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: var(--rule);
}
.tl-item { position: relative; padding: 0 0 34px 26px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before {
  content: "";
  position: absolute;
  left: -26px;
  top: 10px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--paper);
  border: 2px solid var(--gold);
  transform: translateX(-27.5px);
  left: 0;
}
.tl-time {
  position: absolute;
  left: -118px;
  top: 4px;
  width: 84px;
  text-align: right;
  font-family: "Jost", sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--gold-deep);
}
.tl-item h3 { font-size: 26px; }
.tl-item .where { font-style: italic; color: var(--wine); font-size: 17px; }
.tl-item p { color: var(--ink-soft); font-size: 17.5px; margin-top: 4px; }

/* ---- Fund grid ---- */
.fund-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
}
.fund-card {
  background: #fffdf6;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 30px 28px 26px;
  display: flex;
  flex-direction: column;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.fund-card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(35, 37, 43, 0.08); }
.fund-card .icon { font-size: 36px; line-height: 1; }
.fund-card h3 { font-size: 25px; margin: 12px 0 2px; }
.fund-card .price {
  font-family: "Jost", sans-serif;
  font-size: 13px;
  letter-spacing: 0.14em;
  color: var(--gold-deep);
  text-transform: uppercase;
}
.fund-card p { color: var(--ink-soft); font-size: 17px; margin: 10px 0 18px; flex: 1; }
.fund-card .btn { align-self: flex-start; font-size: 12px; padding: 10px 20px; }

.notecard {
  background: var(--paper-2);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 26px 30px;
  max-width: 720px;
  margin: 44px auto 0;
  text-align: center;
  font-size: 17.5px;
  color: var(--ink-soft);
}
.notecard strong { color: var(--ink); }

/* ---- Footer ---- */
footer {
  text-align: center;
  padding: 46px 24px 60px;
  color: var(--ink-soft);
}
footer .crest-mini { width: 70px; opacity: 0.9; margin: 0 auto 12px; }
footer .fine {
  font-family: "Jost", sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 6px;
  opacity: 0.7;
}

@media (max-width: 640px) {
  .nav { flex-direction: column; gap: 12px; }
  .timeline { padding-left: 0; padding-top: 6px; }
  .timeline::before { left: 4px; }
  .tl-item { padding-left: 30px; }
  .tl-item::before { transform: none; left: 0; }
  .tl-time { position: static; display: block; text-align: left; width: auto; margin-bottom: 2px; }
}

    var key = await crypto.subtle.importKey("raw", keyBits, "AES-GCM", false, ["decrypt"]);
    var plain = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: b64ToBytes(NONCE) }, key, b64ToBytes(CT));
    return new TextDecoder().decode(plain);
  }

  function unlock(payload, keyBits) {
    // Swap document.body only — leave <head> (and the already-correct
    // viewport meta) completely untouched. A full document.write()/open()
    // replacement after the page has already loaded causes some mobile
    // browsers to stop honoring the viewport meta tag, which makes CSS
    // grid compute columns against a stale desktop-width layout viewport
    // (that's the "everything crams into 4 columns" bug).
    try { sessionStorage.setItem(KEYSTORE, bytesToB64(keyBits)); } catch (e) {}
    document.title = payload.title;
    document.body.classList.remove("gate-locked");
    document.body.innerHTML = payload.body;
    // innerHTML-inserted <script> tags don't execute — recreate them so they do.
    document.body.querySelectorAll("script").forEach(function (old) {
      var s = document.createElement("script");
      for (var i = 0; i < old.attributes.length; i++) {
        s.setAttribute(old.attributes[i].name, old.attributes[i].value);
      }
      s.textContent = old.textContent;
      old.replaceWith(s);
    });
  }

  async function tryPassword(password) {
    var bits = await deriveKeyBits(password);
    var payload = JSON.parse(await decryptWith(bits)); // throws if wrong
    unlock(payload, bits);
  }

  async function boot() {
    // 1. Key already in this tab's session? (entered on another page)
    try {
      var stored = sessionStorage.getItem(KEYSTORE);
      if (stored) {
        var bits = b64ToBytes(stored).buffer;
        var payload = JSON.parse(await decryptWith(bits));
        unlock(payload, bits);
        return true;
      }
    } catch (e) { try { sessionStorage.removeItem(KEYSTORE); } catch (_) {} }
    // 2. Password in URL fragment? e.g. site/#secretword (fragment never hits the server)
    if (location.hash.length > 1) {
      try {
        var pw = decodeURIComponent(location.hash.slice(1));
        await tryPassword(pw);
        return true;
      } catch (e) {
        history.replaceState(null, "", location.pathname + location.search);
      }
    }
    return false;
  }

  document.getElementById("pwform").addEventListener("submit", async function (ev) {
    ev.preventDefault();
    var input = document.getElementById("pw");
    var btn = document.getElementById("go");
    var err = document.getElementById("err");
    btn.disabled = true;
    err.textContent = "";
    try {
      await tryPassword(input.value.trim());
    } catch (e) {
      btn.disabled = false;
      err.textContent = "Hmm, that's not it. The dog looks disappointed.";
      input.value = "";
      input.focus();
      var gate = document.getElementById("gate");
      gate.classList.remove("shake");
      void gate.offsetWidth;
      gate.classList.add("shake");
    }
  });

  boot();
})();
</script>
</body>
</html>
